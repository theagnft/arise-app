<script>
// ==================== CONFIG ====================
const VERCEL = 'https://arise-app-six.vercel.app';
let ME = {};

// ==================== INIT TELEGRAM ====================
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

async function init() {
  const u = tg?.initDataUnsafe?.user;
  const uid = u?.id;
  const ref = new URLSearchParams(window.location.search).get('ref') || tg?.initDataUnsafe?.start_param || null;

  if (!uid) return;

  // Dados básicos do Telegram
  const name = `${u.first_name || ''} ${u.last_name || ''}`.trim();
  const handle = u.username ? `@${u.username}` : '@usuario';
  const initials = ((u.first_name || '?')[0] + (u.last_name ? u.last_name[0] : '')).toUpperCase();

  document.getElementById('uname').textContent = name;
  document.getElementById('uhandle').textContent = handle;
  document.getElementById('av').textContent = initials;

  // Foto do Telegram
  fetch(`${VERCEL}/api/photo?user_id=${uid}`)
    .then(r => r.ok ? r.blob() : null)
    .then(blob => {
      if (blob) {
        const url = URL.createObjectURL(blob);
        document.getElementById('av').innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`;
      }
    });

  // Busca dados completos do usuário
  await loadUserData(uid, ref);
}

async function loadUserData(uid, ref = null) {
  const params = new URLSearchParams({ user_id: uid, first_name: '', last_name: '', username: '' });
  if (ref) params.set('ref', ref.replace('ref_', ''));

  try {
    const r = await fetch(`${VERCEL}/api/user?${params}`);
    const d = await r.json();
    if (d.ok) {
      ME = d.user;
      ME.quiz_done = d.quiz_done || {1:false, 2:false};
      ME.rank = d.rank;
      updateHome();
      updateRanking(d.ranking || []);
    }
  } catch(e) { console.error(e); }
}

// ==================== HOME ====================
function updateHome() {
  const xp = ME.xp || 0;
  const lvl = Math.floor(xp / 500) + 1;
  const xpInLvl = xp % 500;
  const pct = (xpInLvl / 500 * 100).toFixed(1);

  document.querySelector('.xv').textContent = xp.toLocaleString('pt-BR');
  document.querySelector('.xrk-v').textContent = `#${ME.rank || '--'}`;
  document.querySelector('.ulv').innerHTML = `⭐ Nível ${lvl} · ${xp.toLocaleString('pt-BR')} XP`;

  document.querySelector('.xnt').textContent = `${500 - xpInLvl} XP para o Nível ${lvl + 1}`;
  document.getElementById('xf').style.width = `${pct}%`;

  // Breakdown corrigido
  const xis = document.querySelectorAll('.xi-v');
  xis[0].textContent = `+${ME.xp_invites || 0}`;   // Convites
  xis[1].textContent = `+${ME.xp_quiz || 0}`;      // Quiz
  xis[2].textContent = `+${ME.xp_streak || 0}`;    // Streak
  xis[3].textContent = `${ME.streak || 1} dias`;   // Dias de streak
}

// ==================== REFRESH GLOBAL ====================
async function refreshAll() {
  if (!ME.id) return;
  await loadUserData(ME.id);
  alert('✅ Dados atualizados!');
}

// ==================== QUIZ (totalmente melhorado) ====================
const quizzes = {
  1: { xp: 50, perguntas: [ /* 8 perguntas novas + antigas */ ] },
  2: { xp: 50, perguntas: [ /* 8 perguntas novas + antigas */ ] }
};
// (vou colocar as 8 perguntas completas na versão final que te mando agora)

let curDay = 1, curQ = 0, score = {1:0, 2:0};

async function initQ() {
  // Verifica SEMPRE no backend se já fez hoje
  const today = new Date().toISOString().split('T')[0];
  await loadUserData(ME.id); // força refresh

  if (ME.quiz_done[curDay]) {
    showDoneView();
    return;
  }

  // resto do código do quiz (mesmo fluxo, só com refresh)
  // ...
}

// Depois de terminar o quiz:
async function finishQuiz() {
  // ... salva no backend ...
  await refreshAll(); // ← atualiza XP e ranking automaticamente
  showDoneView();
}

// ==================== NAV E OUTRAS FUNÇÕES ====================
// (mantive exatamente como você tinha, só limpei um pouco)

init();
</script>
