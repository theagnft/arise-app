<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>Arise App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: system-ui, sans-serif; background:#f0f2f5; min-height:100vh; padding-bottom:80px; }
    .hd { background:white; padding:20px; text-align:center; border-bottom:1px solid #eee; }
    .av { width:80px; height:80px; border-radius:50%; margin:0 auto 10px; overflow:hidden; background:#e8f5ec; }
    .uname { font-size:20px; font-weight:700; }
    .uhandle { color:#666; }
    .ulv { background:#e8f5ec; color:#22c55e; padding:5px 14px; border-radius:20px; font-size:14px; display:inline-block; margin:10px 0; }
    
    .pills { display:flex; background:white; border-bottom:1px solid #ddd; }
    .pill { flex:1; padding:15px 0; text-align:center; font-weight:600; color:#666; border-bottom:3px solid transparent; }
    .pill.on { color:#22c55e; border-bottom-color:#22c55e; }

    .tab { display:none; padding:16px; }
    .tab.on { display:block; }

    /* Quiz Styles */
    .dtabs { display:flex; gap:10px; margin-bottom:20px; }
    .dt { flex:1; background:white; border-radius:14px; padding:14px 10px; text-align:center; border:2px solid transparent; }
    .dt.on { border-color:#22c55e; background:#f0fdf4; }
    .dt-n { font-size:13px; font-weight:700; color:#555; }
    .dt-s { font-size:14px; margin-top:4px; font-weight:600; }

    .qcard { background:white; border-radius:18px; overflow:hidden; margin-bottom:20px; box-shadow:0 4px 15px rgba(0,0,0,0.05); }
    .qimg { height:190px; background:#f8f8f8; display:flex; align-items:center; justify-content:center; border-bottom:1px solid #eee; }
    .qtop-bar { display:flex; justify-content:space-between; align-items:center; padding:16px; background:#fafafa; }
    .tring { width:48px; height:48px; border:4px solid #e5e5e5; border-top-color:#2563eb; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:18px; color:#2563eb; }
    .tring.done { animation:none; border-color:#22c55e; color:#22c55e; }

    .qq { font-size:17px; font-weight:700; line-height:1.45; padding:16px; min-height:80px; }
    .qopts { padding:0 16px 20px; display:flex; flex-direction:column; gap:12px; }
    .qo { background:#f8f8f8; padding:16px; border-radius:14px; font-size:16px; cursor:pointer; border:2px solid transparent; transition:all 0.2s; }
    .qo.correct { background:#22c55e; color:white; }
    .qo.wrong { background:#ef4444; color:white; }

    .next-btn { width:100%; padding:16px; background:#0a0a0a; color:white; border:none; border-radius:14px; font-size:17px; font-weight:700; margin:10px 0; }

    .done-card { text-align:center; padding:40px 20px; background:white; border-radius:18px; }
    .done-ico { font-size:70px; margin-bottom:16px; }
  </style>
</head>
<body>

<div class="hd">
  <div class="av" id="av">AG</div>
  <div class="uname" id="uname">Carregando...</div>
  <div class="uhandle" id="uhandle">@usuario</div>
  <div class="ulv" id="ulv">⭐ Nível 2 · 680 XP</div>
</div>

<div class="pills">
  <div class="pill on" id="ph" onclick="switchTab('h')">Home</div>
  <div class="pill" id="pq" onclick="switchTab('q')">Quiz</div>
  <div class="pill" id="pr" onclick="switchTab('r')">Ranking</div>
  <div class="pill" id="pp" onclick="switchTab('p')">Perfil</div>
</div>

<!-- QUIZ -->
<div class="tab on" id="tq">
  <div class="dtabs">
    <div class="dt on" id="d1tab" onclick="setDay(1)"><div class="dt-n">QUIZ 1</div><div class="dt-s" id="d1s">Ativo</div></div>
    <div class="dt" id="d2tab" onclick="setDay(2)"><div class="dt-n">QUIZ 2</div><div class="dt-s" id="d2s">Pendente</div></div>
  </div>

  <div id="qview">
    <div class="qcard">
      <div class="qimg"><svg id="qsvg" width="100%" height="190" viewBox="0 0 340 190" xmlns="http://www.w3.org/2000/svg"></svg></div>
      <div class="qtop-bar">
        <div style="display:flex; align-items:center; gap:12px;">
          <div class="tring" id="timer">30</div>
          <span>segundos</span>
        </div>
        <div style="background:#eff6ff; color:#2563eb; padding:6px 16px; border-radius:20px; font-weight:700;">+50 XP</div>
      </div>
      <div class="qq" id="question"></div>
      <div class="qopts" id="options"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()" style="display:none;">Próxima Pergunta →</button>
  </div>

  <div id="doneview" style="display:none;">
    <div class="done-card">
      <div class="done-ico" id="doneIco">🎯</div>
      <h2 id="doneTitle">Quiz Concluído!</h2>
      <p id="doneSub"></p>
      <div style="font-size:28px; font-weight:800; color:#22c55e; margin:20px 0;" id="doneXP"></div>
      <button onclick="switchTab('h')" style="padding:14px 32px; background:#22c55e; color:white; border:none; border-radius:12px; font-size:16px;">Voltar para Home</button>
    </div>
  </div>
</div>

<!-- Abas vazias por enquanto -->
<div class="tab" id="th"><h3>Home</h3></div>
<div class="tab" id="tr"><h3>Ranking</h3></div>
<div class="tab" id="tp"><h3>Perfil</h3></div>

<div class="nb">
  <div class="ni on" id="nh" onclick="switchTab('h')">🏠<br><small>Home</small></div>
  <div class="ni" id="nq" onclick="switchTab('q')">❓<br><small>Quiz</small></div>
  <div class="ni" id="nr" onclick="switchTab('r')">🏆<br><small>Ranking</small></div>
  <div class="ni" id="np" onclick="switchTab('p')">👤<br><small>Perfil</small></div>
</div>

<script>
const VERCEL = 'https://arise-app-six.vercel.app';
let ME = {};
let currentDay = 1;
let currentQuestion = 0;
let score = 0;
let timerInterval = null;

const quizzes = {
  1: {
    questions: [
      { 
        q: "Qual padrão de candle indica reversão de alta após tendência de baixa?", 
        options: ["Doji", "Evening Star", "Hammer", "Shooting Star"], 
        correct: 2,
        svg: (s) => { s.innerHTML = `<rect x="0" y="0" width="340" height="190" fill="#f8f8f8"/><text x="170" y="25" text-anchor="middle" font-size="11" fill="#888">BTC/USDT 4H</text><line x1="60" y1="140" x2="60" y2="70" stroke="#ef4444" stroke-width="3"/><rect x="52" y="95" width="16" height="35" fill="#ef4444" rx="2"/>`; }
      },
      { 
        q: "O que o gráfico abaixo demonstra?", 
        options: ["Rompimento", "Teste de suporte", "Double Top", "Consolidação"], 
        correct: 1,
        svg: (s) => { s.innerHTML = `<rect x="0" y="0" width="340" height="190" fill="#f8f8f8"/><text x="170" y="25" text-anchor="middle" font-size="11" fill="#888">SOL/USDT</text><line x1="30" y1="120" x2="310" y2="120" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,4"/>`; }
      },
      { 
        q: "Qual indicador está mostrando sobrecompra?", 
        options: ["MACD", "RSI", "Médias Móveis", "Volume"], 
        correct: 1,
        svg: (s) => { s.innerHTML = `<rect x="0" y="0" width="340" height="190" fill="#f8f8f8"/><text x="170" y="30" text-anchor="middle" font-size="12" fill="#888">RSI (14)</text><polyline points="30,150 80,120 130,100 180,85 230,60 280,55" fill="none" stroke="#f59e0b" stroke-width="4"/>`; }
      },
      { 
        q: "O volume alto confirma:", 
        options: ["Fakeout", "Movimento válido", "Reversão", "Consolidação"], 
        correct: 1,
        svg: (s) => { s.innerHTML = `<rect x="0" y="0" width="340" height="190" fill="#f8f8f8"/><rect x="50" y="80" width="25" height="90" fill="#22c55e" rx="3"/><rect x="90" y="60" width="25" height="110" fill="#22c55e" rx="3"/>`; }
      }
    ]
  },
  2: {
    questions: [
      { 
        q: "O que significa Golden Cross?", 
        options: ["Média curta cruza para baixo", "Média curta cruza para cima", "Suporte rompido", "Resistência"], 
        correct: 1,
        svg: (s) => { s.innerHTML = `<rect x="0" y="0" width="340" height="190" fill="#f8f8f8"/><polyline points="40,150 90,130 140,125 190,100 240,70 290,55" fill="none" stroke="#22c55e" stroke-width="4"/>`; }
      },
      { 
        q: "Qual nível de Fibonacci é mais forte como suporte?", 
        options: ["23.6%", "38.2%", "61.8%", "78.6%"], 
        correct: 2,
        svg: (s) => { s.innerHTML = `<rect x="0" y="0" width="340" height="190" fill="#f8f8f8"/><line x1="40" y1="60" x2="300" y2="60" stroke="#ef4444" stroke-width="3"/><text x="310" y="65" font-size="14" fill="#ef4444">61.8%</text>`; }
      },
      { 
        q: "Este padrão é conhecido como?", 
        options: ["Bull Flag", "Head and Shoulders", "Triangle", "Cup and Handle"], 
        correct: 0,
        svg: (s) => { s.innerHTML = `<rect x="0" y="0" width="340" height="190" fill="#f8f8f8"/><polyline points="50,160 90,100 130,95 170,120 210,80 250,75" fill="none" stroke="#22c55e" stroke-width="4"/>`; }
      },
      { 
        q: "Qual é o principal risco da alavancagem?", 
        options: ["Baixa volatilidade", "Liquidação", "Lucro garantido", "Menos emoção"], 
        correct: 1,
        svg: (s) => { s.innerHTML = `<rect x="0" y="0" width="340" height="190" fill="#f8f8f8"/><text x="170" y="100" text-anchor="middle" font-size="48" fill="#ef4444" opacity="0.8">⚠️</text>`; }
      }
    ]
  }
};

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('on'));

  document.getElementById('t' + tab).classList.add('on');
  document.getElementById('p' + tab).classList.add('on');
  document.getElementById('n' + tab).classList.add('on');
}

function setDay(day) {
  currentDay = day;
  currentQuestion = 0;
  score = 0;

  document.getElementById('d1tab').classList.toggle('on', day === 1);
  document.getElementById('d2tab').classList.toggle('on', day === 2);

  document.getElementById('qview').style.display = 'block';
  document.getElementById('doneview').style.display = 'none';

  loadQuestion();
}

function loadQuestion() {
  const quiz = quizzes[currentDay];
  const q = quiz.questions[currentQuestion];

  document.getElementById('question').textContent = q.q;
  q.svg(document.getElementById('qsvg'));

  const container = document.getElementById('options');
  container.innerHTML = '';

  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'qo';
    div.textContent = opt;
    div.onclick = () => answerQuestion(i, q.correct);
    container.appendChild(div);
  });

  startTimer();
  document.getElementById('nextBtn').style.display = 'none';
}

function startTimer() {
  let time = 30;
  const timerEl = document.getElementById('timer');
  timerEl.textContent = time;

  if (timerInterval) clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    time--;
    timerEl.textContent = time;
    if (time <= 0) {
      clearInterval(timerInterval);
      timeUp();
    }
  }, 1000);
}

function answerQuestion(selected, correct) {
  clearInterval(timerInterval);

  const options = document.querySelectorAll('.qo');
  options.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === correct) el.classList.add('correct');
    if (i === selected && i !== correct) el.classList.add('wrong');
  });

  if (selected === correct) score++;

  document.getElementById('nextBtn').style.display = 'block';
}

function timeUp() {
  const correct = quizzes[currentDay].questions[currentQuestion].correct;
  const options = document.querySelectorAll('.qo');
  options.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === correct) el.classList.add('correct');
  });
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  currentQuestion++;
  if (currentQuestion < quizzes[currentDay].questions.length) {
    loadQuestion();
  } else {
    finishQuiz();
  }
}

async function finishQuiz() {
  const xpEarned = score * 50;

  try {
    await fetch(`${VERCEL}/api/quiz`, {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: `user_id=${ME.id || ''}&quiz_number=${currentDay}&score=${score}`
    });
  } catch(e) {}

  document.getElementById('qview').style.display = 'none';
  document.getElementById('doneview').style.display = 'block';

  document.getElementById('doneTitle').textContent = `Quiz ${currentDay} Concluído!`;
  document.getElementById('doneSub').textContent = `Você acertou ${score} de 4`;
  document.getElementById('doneXP').textContent = `+${xpEarned} XP`;
  document.getElementById('doneIco').textContent = score >= 3 ? '🏆' : '👍';
}

// Init
async function init() {
  const u = window.Telegram?.WebApp?.initDataUnsafe?.user;
  if (u) {
    document.getElementById('uname').textContent = u.first_name || 'Usuário';
    document.getElementById('uhandle').textContent = u.username ? '@' + u.username : '';
    
    if (u.id) {
      fetch(`${VERCEL}/api/photo?user_id=${u.id}`)
        .then(r => r.ok ? r.blob() : null)
        .then(blob => {
          if (blob) {
            document.getElementById('av').innerHTML = `<img src="${URL.createObjectURL(blob)}" style="width:100%;height:100%;object-fit:cover;">`;
          }
        });
    }
  }
}

init();
</script>
</body>
</html>
