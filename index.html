<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>Arise App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: system-ui, sans-serif; background:#f0f2f5; min-height:100vh; padding-bottom:80px; }
    .hd { background:white; padding:20px; text-align:center; border-bottom:1px solid #eee; }
    .av { width:80px; height:80px; border-radius:50%; margin:0 auto 10px; overflow:hidden; }
    .uname { font-size:20px; font-weight:700; }
    .uhandle { color:#666; }
    .ulv { background:#e8f5ec; color:#22c55e; padding:5px 14px; border-radius:20px; font-size:14px; display:inline-block; margin:10px 0; }

    .pills { display:flex; background:white; border-bottom:1px solid #ddd; }
    .pill { flex:1; padding:15px 0; text-align:center; font-weight:600; color:#666; border-bottom:3px solid transparent; }
    .pill.on { color:#22c55e; border-bottom-color:#22c55e; }

    .tab { display:none; padding:16px; }
    .tab.on { display:block; }

    .dtabs { display:flex; gap:12px; margin-bottom:20px; }
    .dt { flex:1; background:white; border-radius:16px; padding:16px 12px; text-align:center; border:2px solid transparent; }
    .dt.on { border-color:#22c55e; background:#f0fdf4; }
    .dt-n { font-size:14px; font-weight:700; }
    .dt-s { font-size:13px; margin-top:6px; color:#555; }

    .qcard { background:white; border-radius:18px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.06); }
    .qimg { height:210px; background:#fafafa; display:flex; align-items:center; justify-content:center; position:relative; }
    .qimg-label { position:absolute; top:12px; left:12px; background:rgba(0,0,0,0.7); color:white; font-size:11px; padding:2px 8px; border-radius:4px; }

    .qtop-bar { padding:16px; display:flex; justify-content:space-between; align-items:center; background:#f8f9fa; }
    .timer-circle { width:56px; height:56px; border:5px solid #e5e5e5; border-top-color:#3b82f6; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800; color:#1e40af; }

    .qq { font-size:17.5px; font-weight:700; line-height:1.4; padding:20px 16px 16px; }
    .qopts { padding:0 16px 24px; display:flex; flex-direction:column; gap:10px; }
    .qo { background:#f8f9fa; padding:16px; border-radius:14px; font-size:16px; cursor:pointer; border:2px solid transparent; }
    .qo.correct { background:#22c55e; color:white; border-color:#22c55e; }
    .qo.wrong { background:#ef4444; color:white; border-color:#ef4444; }

    .next-btn { width:100%; padding:16px; background:#111; color:white; border:none; border-radius:14px; font-size:17px; font-weight:700; margin-top:10px; }

    .done-card { text-align:center; padding:50px 20px; background:white; border-radius:18px; }
    .done-ico { font-size:72px; margin-bottom:20px; }
  </style>
</head>
<body>

<div class="hd">
  <div class="av" id="av">AG</div>
  <div class="uname" id="uname">Carregando...</div>
  <div class="uhandle" id="uhandle">@usuario</div>
  <div class="ulv" id="ulv">⭐ Nível 2 · 680 XP</div>
</div>

<div class="pills">
  <div class="pill on" id="ph" onclick="switchTab('h')">Home</div>
  <div class="pill" id="pq" onclick="switchTab('q')">Quiz</div>
  <div class="pill" id="pr" onclick="switchTab('r')">Ranking</div>
  <div class="pill" id="pp" onclick="switchTab('p')">Perfil</div>
</div>

<div class="tab on" id="tq">
  <div class="dtabs">
    <div class="dt on" id="d1tab" onclick="setDay(1)"><div class="dt-n">QUIZ 1</div><div class="dt-s" id="d1s">Ativo</div></div>
    <div class="dt" id="d2tab" onclick="setDay(2)"><div class="dt-n">QUIZ 2</div><div class="dt-s" id="d2s">Pendente</div></div>
  </div>

  <div id="qview">
    <div class="qcard">
      <div class="qimg" id="qimg">
        <svg id="qsvg" width="100%" height="210" viewBox="0 0 340 210" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="qtop-bar">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="timer-circle" id="timer">30</div>
          <span style="font-size:15px;color:#555;">segundos restantes</span>
        </div>
        <div style="background:#dbeafe;color:#1e40af;padding:8px 16px;border-radius:9999px;font-weight:700;">+50 XP</div>
      </div>
      <div class="qq" id="question"></div>
      <div class="qopts" id="options"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()" style="display:none;">Próxima Pergunta →</button>
  </div>

  <div id="doneview" style="display:none;">
    <div class="done-card">
      <div class="done-ico" id="doneIco">🎯</div>
      <h2 id="doneTitle">Quiz Concluído!</h2>
      <p id="doneSub"></p>
      <div id="doneXP" style="font-size:28px;font-weight:800;color:#22c55e;margin:20px 0;"></div>
      <button onclick="switchTab('h')" style="padding:14px 40px;background:#22c55e;color:white;border:none;border-radius:12px;">Voltar para Home</button>
    </div>
  </div>
</div>

<script>
const VERCEL = 'https://arise-app-six.vercel.app';
let currentDay = 1;
let currentQuestion = 0;
let score = 0;
let timerInterval = null;

const quizzes = {
  1: {
    questions: [
      {
        q: "Qual padrão de candle indica reversão de alta após tendência de baixa?",
        options: ["Doji", "Evening Star", "Hammer", "Shooting Star"],
        correct: 2,
        svg: (s) => {
          s.innerHTML = `
            <rect x="0" y="0" width="340" height="210" fill="#f8fafc"/>
            <text x="170" y="25" text-anchor="middle" font-size="12" fill="#64748b">BTC/USDT 4H</text>
            <!-- Candle Bearish -->
            <line x1="70" y1="160" x2="70" y2="90" stroke="#ef4444" stroke-width="6"/>
            <rect x="58" y="120" width="24" height="45" fill="#ef4444" rx="2"/>
            <!-- Candle Bullish Hammer -->
            <line x1="140" y1="155" x2="140" y2="75" stroke="#22c55e" stroke-width="6"/>
            <rect x="128" y="130" width="24" height="28" fill="#22c55e" rx="2"/>
            <text x="170" y="195" text-anchor="middle" font-size="11" fill="#64748b">Hammer - Reversão de Alta</text>
          `;
        }
      },
      {
        q: "O gráfico abaixo está mostrando um teste de suporte?",
        options: ["Sim, teste de suporte", "Rompimento de resistência", "Double Top", "Tendência de baixa"],
        correct: 0,
        svg: (s) => {
          s.innerHTML = `
            <rect x="0" y="0" width="340" height="210" fill="#f8fafc"/>
            <text x="170" y="25" text-anchor="middle" font-size="12" fill="#64748b">SOL/USDT Daily</text>
            <line x1="30" y1="145" x2="310" y2="145" stroke="#3b82f6" stroke-width="3" stroke-dasharray="8,4"/>
            <polyline points="40,120 90,135 140,110 190,130 240,125 290,140" fill="none" stroke="#1e2937" stroke-width="4"/>
            <text x="170" y="195" text-anchor="middle" font-size="11" fill="#64748b">Teste de Suporte</text>
          `;
        }
      }
      // Adicionei só 2 por enquanto pra não ficar gigante. Podemos adicionar as outras 2 depois se gostar
    ]
  },
  2: {
    questions: [
      {
        q: "O que o RSI acima de 70 indica?",
        options: ["Sobrevendido", "Sobrecomprado", "Tendência neutra", "Momentum forte"],
        correct: 1,
        svg: (s) => {
          s.innerHTML = `
            <rect x="0" y="0" width="340" height="210" fill="#f8fafc"/>
            <text x="170" y="30" text-anchor="middle" font-size="13" fill="#64748b">RSI (14 períodos)</text>
            <line x1="30" y1="80" x2="310" y2="80" stroke="#ef4444" stroke-width="3"/>
            <text x="320" y="85" font-size="12" fill="#ef4444">70</text>
            <polyline points="40,160 80,140 120,125 160,105 200,90 240,75 280,68" fill="none" stroke="#f59e0b" stroke-width="5"/>
          `;
        }
      }
      // Mais perguntas virão
    ]
  }
};

function switchTab(tab) { /* mesma função anterior */ }
function setDay(day) { /* mesma */ }
function loadQuestion() { /* mesma lógica */ }
function startTimer() { /* mesma */ }
function answerQuestion() { /* mesma */ }
function nextQuestion() { /* mesma */ }
function finishQuiz() { /* mesma */ }

async function init() {
  const u = window.Telegram?.WebApp?.initDataUnsafe?.user;
  if (u) {
    document.getElementById('uname').textContent = u.first_name || 'Usuário';
    document.getElementById('uhandle').textContent = u.username ? '@' + u.username : '';
    if (u.id) {
      fetch(`${VERCEL}/api/photo?user_id=${u.id}`)
        .then(r => r.ok ? r.blob() : null)
        .then(blob => {
          if (blob) document.getElementById('av').innerHTML = `<img src="${URL.createObjectURL(blob)}" style="width:100%;height:100%;object-fit:cover;">`;
        });
    }
  }
}

init();
</script>
</body>
</html>
