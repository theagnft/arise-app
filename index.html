<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>Arise App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin:0; font-family: system-ui, sans-serif; background:#f0f2f5; }
    .hd { background:white; padding:20px; text-align:center; border-bottom:1px solid #eee; }
    .av { width:80px; height:80px; border-radius:50%; margin:0 auto 10px; overflow:hidden; background:#22c55e; color:white; font-size:32px; display:flex; align-items:center; justify-content:center; }
    .pills { display:flex; background:white; }
    .pill { flex:1; padding:14px 0; text-align:center; font-weight:600; color:#666; border-bottom:3px solid transparent; }
    .pill.on { color:#22c55e; border-bottom-color:#22c55e; }
    .tab { display:none; padding:20px; min-height:60vh; }
    .tab.on { display:block; }
    .nb { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #ddd; display:flex; }
    .ni { flex:1; padding:10px 0; text-align:center; color:#666; }
    .ni.on { color:#22c55e; }
  </style>
</head>
<body>

<div class="hd">
  <div class="av" id="av">AG</div>
  <h2 id="uname">AG</h2>
  <p id="uhandle">@agboolish</p>
  <div style="margin:10px 0; background:#e8f5ec; display:inline-block; padding:4px 12px; border-radius:20px; font-size:14px;">⭐ Nível 2 · 680 XP</div>
</div>

<div class="pills">
  <div class="pill on" id="ph" onclick="switchTab('h')">Home</div>
  <div class="pill" id="pq" onclick="switchTab('q')">Quiz</div>
  <div class="pill" id="pr" onclick="switchTab('r')">Ranking</div>
  <div class="pill" id="pp" onclick="switchTab('p')">Perfil</div>
</div>

<div class="tab on" id="th">
  <h3>Home - XP Total: 680</h3>
  <p>Ranking semanal: #7</p>
  <button onclick="refreshAll()" style="margin-top:20px; padding:12px 24px; background:#22c55e; color:white; border:none; border-radius:12px;">Atualizar Dados</button>
</div>

<div class="tab" id="tq">
  <h3>Quiz</h3>
  <p>Quiz 1 e Quiz 2 aparecerão aqui em breve.</p>
</div>

<div class="tab" id="tr">
  <h3>Ranking Semanal</h3>
  <p>Ranking completo virá aqui.</p>
</div>

<div class="tab" id="tp">
  <h3>Perfil</h3>
  <p>Seu link de convite e conquistas.</p>
</div>

<div class="nb">
  <div class="ni on" id="nh" onclick="switchTab('h')">🏠</div>
  <div class="ni" id="nq" onclick="switchTab('q')">❓</div>
  <div class="ni" id="nr" onclick="switchTab('r')">🏆</div>
  <div class="ni" id="np" onclick="switchTab('p')">👤</div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  console.log("✅ Telegram WebApp carregado");
}

function switchTab(tab) {
  console.log("🔄 Trocando para aba:", tab);
  
  // Remove 'on' de todas as abas e nav
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('on'));

  // Ativa a nova aba
  document.getElementById(tab + 'h' || 'th').classList.add('on'); // fallback
  document.getElementById('p' + tab).classList.add('on');
  document.getElementById('n' + tab).classList.add('on');
}

async function refreshAll() {
  alert("🔄 Atualizando dados...");
  // Aqui vamos colocar a chamada real depois que as abas funcionarem
}

// Inicializa foto e nome
window.onload = () => {
  const u = tg?.initDataUnsafe?.user;
  if (u) {
    document.getElementById('uname').textContent = u.first_name || 'Usuário';
    document.getElementById('uhandle').textContent = u.username ? '@' + u.username : '';
    
    // Foto
    if (u.id) {
      fetch('https://arise-app-six.vercel.app/api/photo?user_id=' + u.id)
        .then(r => r.ok ? r.blob() : null)
        .then(blob => {
          if (blob) {
            const url = URL.createObjectURL(blob);
            document.getElementById('av').innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;">`;
          }
        });
    }
  }
};
</script>
</body>
</html>
